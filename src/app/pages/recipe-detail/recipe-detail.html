<div *ngIf="!recipe">Loading recipe...</div>
<app-recipe-editor
  *ngIf="recipe"
  [recipeId]="recipeId"
  [title]="recipe.title"
  [yield]="recipe.yield"
  (titleChange)="onTitleChange($event)"
  (yieldChange)="onYieldChange($event)"
  [ingredients]="ingredientsRows"
  [instructions]="instructionsRows"
  [archived]="archived"
  [editable]="!editable"
>
</app-recipe-editor>

<form [formGroup]="recipeForm" class="recipe-editor">
  <!-- Edit mode - title -->
  <div 
    *ngIf="isEditingTitle; else viewModeTitle" 
    class="flex gap-2 mb-1"
  >
    <div class="flex grow my-1">
      <input
        type="text"
        id="recipe-title"
        formControlName="title"
        [readonly]="!isEditingTitle"
        placeholder="Untitled Recipe"
        class="font-heading font-medium text-2xl md:text-4xl leading-normal border-b border-light color-dark-gray"
      />
    </div>
    <div class="editing-options-editmode flex my-1 md:my-3">
      <button
        class=""
        type="button" 
        (click)="saveTitle()"
      >
        <mat-icon class="color-dark-gray">check</mat-icon>
      </button>
    </div>
  </div>

  <!-- View mode - title -->
  <ng-template #viewModeTitle>
    <div class="flex gap-2 mb-1">
      <div class="flex grow my-1">
        <h1 class="font-heading font-bold text-2xl md:text-4xl leading-normal border-b border-light">
          {{ recipeForm.get('title')?.value || 'Untitled Recipe' }}
        </h1>
      </div>
      <div *ngIf="isAuthor || !recipeId" class="editing-options-viewmode flex my-1 md:my-3">
        <button 
          mat-icon-button 
          matTooltip="Click to Edit" 
          (click)="editTitle()" 
          class="iconbutton"
        >
          <mat-icon aria-label="Edit" class="color-dark-gray">edit</mat-icon>
        </button>
      </div>
    </div>
  </ng-template>

  <div class="recipe-forms">
    <div class="yield-form mb-6">
      <!-- Yield form header -->
      <div class="flex flex-row justify-between items-center mb-1">
        <div>
          <h2 class="font-subheading font-bold text-base mb-1">Yields:</h2>

          <!-- Edit mode - yield -->
          <div 
            *ngIf="(isAuthor || !recipeId) && isEditingYield; else viewModeYield" 
            class="flex w-full"
          >
            <div class="yield-inputs flex flex-row gap-1">
              <input
                type="number"
                id="yield-amount"
                placeholder="'6'"
                formControlName="yieldAmount"
                class="font-body font-normal text-base w-4 border-b border-light rounded-sm bg-light-blue px-1 py-0.5"
              />
              <input
                type="text"
                id="yield-unit"
                placeholder="'loaves'"
                formControlName="yieldUnit"
                class="font-body font-normal text-base w-8 border-b border-light rounded-sm bg-light-blue px-1 py-0.5"
              />
            </div>
          </div>
        </div>

        <div *ngIf="isAuthor || !recipeId" class="editing-options flex shrink-0">
          <button 
            *ngIf="!isEditingYield"
            (click)="editYield()" 
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
            type="button"
          >edit</button>
          <button
            *ngIf="isEditingYield" 
            (click)="saveYield()"
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
            type="button"
          >view</button>
        </div>
      </div>

      <!-- View mode - yield -->
      <ng-template #viewModeYield>
        <div class="flex items-center h-3">
          <h2 class="font-body font-medium text-base">{{ recipeForm.get('yieldAmount')?.value }} {{ recipeForm.get('yieldUnit')?.value }}</h2>
        </div>
      </ng-template>
    </div>

    <div class="ingredients-form mb-6">
      <!-- Ingredients form header -->
      <div class="flex justify-between mb-2">
        <h2 class="font-heading font-semibold text-lg tracking-wide">Ingredients</h2>

        <div *ngIf="isAuthor || !recipeId" class="editing-options flex shrink-0">
          <button 
            *ngIf="!isEditingIngredients"
            (click)="editIngredients()" 
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
            type="button"
          >edit</button>
          <button
            *ngIf="isEditingIngredients" 
            (click)="saveIngredients()"
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
            type="button"
          >view</button>
        </div>
      </div>

      <app-ingredients-form
        [initialIngredients]="ingredients"
        [editable]="isEditingIngredients"
        (ingredientsChange)="onIngredientsChange($event)"
      > </app-ingredients-form>
    </div>

    <div class="instructions-form mb-6">
      <!-- Instructions form header -->
      <div class="flex justify-between mb-2">
        <h2 class="font-heading font-semibold text-lg tracking-wide">Instructions</h2>

        <div *ngIf="isAuthor || !recipeId" class="editing-options flex shrink-0">
          <button 
            *ngIf="!isEditingInstructions"
            (click)="editInstructions()" 
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
          >edit</button>
          <button
            *ngIf="isEditingInstructions" 
            class="font-normal text-sm underline lg:no-underline underline-offset-8 hover:underline"
            type="button" 
            (click)="saveInstructions()"
          >view</button>
        </div>
      </div>

      <app-instructions-form
        [initialInstructions]="instructions"
        [editable]="isEditingInstructions"
        (instructionsChange)="onInstructionsChange($event)"
      ></app-instructions-form>
    </div>

    <!-- Public / private toggle -->
    <div *ngIf="isAuthor" class="flex flex-col">
      <div class="mb-1">
        <p class="text-xs color-dark-gray">
          {{ isPublic ? 'Anyone can view' : 'Only you can view' }}
        </p>
      </div>
      <mat-slide-toggle
        color="primary"
        id="toggle-public"
        class=""
        formControlName="isPublic"
        (change)="togglePublic($event)"
      ></mat-slide-toggle>
    </div>
  </div>

  <!-- Options fixed footer (only for recipe authors) -->
  <div 
    *ngIf="isAuthor || !recipeId" 
    class="flex justify-between fixed bottom-0 left-0 right-0 px-2 py-2 md:px-6 md:py-4 bg-white"
  >
    <!-- Save / Archive options -->
    <div class="flex gap-1 py-0">
      <button
        type="button"
        class="font-body font-semibold text-sm md:text-base tracking-widest px-1 py-0.5 bg-white border-2 border-orange shadow-md rounded-sm"
        (click)="saveRecipe()"
      >SAVE</button>
      <button
        *ngIf="recipeId"
        type="button"
        class="font-body font-normal text-sm md:text-base tracking-widest color-dark-gray px-1 py-0.5 bg-white border border-dark shadow-md rounded-sm"
        (click)="toggleArchive()"
      >{{ archived ? 'RESTORE' : 'ARCHIVE' }}</button>
    </div>

    <!-- Delete option-->
    <div *ngIf="recipeId" class="flex items-center">
      <button
        type="button"
        (click)="confirmDelete()"
        class="font-body font-semibold text-xs md:text-sm tracking-widest color-red px-1 py-0.5 bg-white border border-red shadow-md rounded-sm hover:underline flex items-center gap-0.5"
      >
        <mat-icon class="text-sm">delete_outline</mat-icon>
        DELETE
      </button>
    </div>
  </div>

  <div class="h-8"></div> <!-- Spacer div -->
</form>

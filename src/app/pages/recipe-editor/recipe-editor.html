<div class="recipe-editor">
  <!-- Edit mode -->
  <div *ngIf="isEditingTitle; else viewMode" class="flex mb-4">
    <div class="grow">
      <input
        type="text"
        id="recipe-title"
        [(ngModel)]="title"
        [readonly]="!editable"
        placeholder="Title"
        class="font-heading text-2xl px-0 py-1 w-full mb-2 border-b-2"
      />
    </div>
    <!--[readonly]="!editable" (evaluates @Input() editable = true;)-->
    <div class="editing-options-editmode">
      <button
        class="font-body font-medium text-sm px-2 py-0.5 rounded-sm bg-med-blue"
        type="button"
        (click)="saveTitle()"
      >
        save
      </button>
    </div>
  </div>

  <!-- View mode -->
  <ng-template #viewMode>
    <div class="flex mb-4">
      <div class="grow">
        <h2 class="font-heading text-2xl px-0 py-1 w-full">
          {{ title || 'Untitled Recipe' }}
        </h2>
      </div>
      <div class="editing-options-viewmode">
        <button 
          mat-icon-button 
          matTooltip="Click to Edit" 
          (click)="editTitle()" 
          class="iconbutton"
        >
          <mat-icon aria-label="Edit" class="color-d-gray">edit</mat-icon>
        </button>
      </div>
    </div>
  </ng-template>

  <div class="mb-4">
    <h3 class="font-semibold mb-2">Ingredients</h3>

    <app-ingredients-form
      [initialIngredients]="ingredients"
      [editable]="editable"
      (ingredientsChange)="onIngredientsChange($event)"
    >
    </app-ingredients-form>
  </div>

  <div class="mb-2">
    <h3 class="font-semibold mb-2">Instructions</h3>

    <app-instructions-form
      [initialInstructions]="instructions"
      [editable]="editable"
      (instructionsChange)="onInstructionsChange($event)"
    >
    </app-instructions-form>
  </div>

  <div class="flex gap-1 mt-4">
    <button
      type="button"
      class="font-body font-semibold text-sm tracking-wide px-1 py-1 rounded-sm bg-med-blue"
      (click)="saveRecipe()"
    >
      Save
    </button>

    <button
      type="button"
      class="font-body font-semibold text-sm tracking-wide px-1 py-1 rounded-sm bg-accent-light"
      (click)="archiveRecipe()"
    >
      Archive
    </button>
  </div>
</div>

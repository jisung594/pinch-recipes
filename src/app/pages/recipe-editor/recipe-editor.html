<form [formGroup]="recipeForm" class="recipe-editor">
  <!-- Edit mode - title -->
  <div 
    *ngIf="isEditingTitle; else viewModeTitle" 
    class="flex gap-2 mb-1">
    <div class="flex grow my-1">
      <input
        type="text"
        id="recipe-title"
        formControlName="title"
        [readonly]="!isEditingTitle"
        placeholder="Untitled Recipe"
        class="font-heading font-medium text-3xl md:text-4xl tracking-wide border-b border-light color-dark-gray"/>
    </div>
    <div class="editing-options-editmode flex my-1 md:my-3">
      <button
        (click)="saveTitle()"
        type="button"
        mat-icon-button 
        matTooltip="Done Editing">
          <mat-icon class="color-dark-gray icon-sm">visibility</mat-icon>
      </button>
    </div>
  </div>

  <!-- View mode - title -->
  <ng-template #viewModeTitle>
    <div class="flex gap-2 mb-1">
      <div class="flex grow my-1">
        <h1 class="font-heading font-bold text-3xl md:text-4xl tracking-wide border-b border-light">
          {{ recipeForm.get('title')?.value || 'Untitled Recipe' }}
        </h1>
      </div>
      <div *ngIf="isAuthor || !recipeId" class="editing-options-viewmode flex my-1 md:my-3">
        <button 
          mat-icon-button 
          matTooltip="Click to Edit" 
          (click)="editTitle()">
            <mat-icon aria-label="Edit" class="color-dark-gray icon-sm">edit</mat-icon>
        </button>
      </div>
    </div>
  </ng-template>

  <div class="recipe-forms">
    <div class="yield-form mb-6">
      <!-- Yield form header -->
      <div class="flex flex-row justify-between">
        <div class="flex flex-row items-center gap-1">
          <h2 class="font-body font-normal text-base">Yields:</h2>

          <!-- Edit mode - yield -->
          <div 
            *ngIf="(isAuthor || !recipeId) && isEditingYield; else viewModeYield" 
            class="flex w-full">
            <div class="yield-inputs flex flex-row gap-1">
              <input
                type="number"
                id="yield-amount"
                placeholder="'6'"
                formControlName="yieldAmount"
                class="font-body font-normal text-base w-4 rounded-sm bg-light-blue shadow-sm px-1 py-0.5"/>
              <input
                type="text"
                id="yield-unit"
                placeholder="'loaves'"
                formControlName="yieldUnit"
                class="font-body font-normal text-base w-6 rounded-sm bg-light-blue shadow-sm px-1 py-0.5"/>
            </div>
          </div>
        </div>

        <div 
          *ngIf="isAuthor || !recipeId" 
          matRipple 
          matRippleColor="rgba(162, 211, 255, 0.2)"
          [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
          [matRippleUnbounded]="true"
          [matRippleRadius]="30" 
          class="editing-options flex shrink-0">
          <button 
            *ngIf="!isEditingYield"
            (click)="editYield()"
            type="button"
            mat-icon-button 
            matTooltip="Click to Edit">
              <mat-icon aria-label="Edit" class="color-dark-gray icon-sm">edit</mat-icon>
          </button>
          <button
            *ngIf="isEditingYield" 
            (click)="saveYield()"
            type="button"
            mat-icon-button 
            matTooltip="Done Editing">
              <mat-icon class="color-dark-gray icon-sm">visibility</mat-icon>
          </button>
        </div>
      </div>

      <!-- View mode - yield -->
      <ng-template #viewModeYield>
        <div class="flex items-center h-3">
          <h2 class="font-body font-normal text-base">{{ recipeForm.get('yieldAmount')?.value }} {{ recipeForm.get('yieldUnit')?.value }}</h2>
        </div>
      </ng-template>
    </div>

    <div class="ingredients-form mb-6">
      <!-- Ingredients form header -->
      <div class="flex justify-between mb-2">
        <h2 class="font-heading font-semibold text-lg tracking-wide">Ingredients</h2>

        <div 
          *ngIf="isAuthor || !recipeId" 
          matRipple 
          matRippleColor="rgba(162, 211, 255, 0.2)"
          [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
          [matRippleUnbounded]="true"
          [matRippleRadius]="30" 
          class="editing-options flex shrink-0">
            <button 
              *ngIf="!isEditingIngredients"
              (click)="editIngredients()"
              type="button"
              mat-icon-button 
              matTooltip="Click to Edit">
                <mat-icon aria-label="Edit" class="color-dark-gray icon-sm">edit</mat-icon>
            </button>
            <button
              *ngIf="isEditingIngredients" 
              (click)="saveIngredients()"
              type="button"
              mat-icon-button 
              matTooltip="Done Editing">
                <mat-icon class="color-dark-gray icon-sm">visibility</mat-icon>
            </button>
        </div>
      </div>

      <app-ingredients-form
        [initialIngredients]="ingredients"
        [editable]="isEditingIngredients"
        (ingredientsChange)="onIngredientsChange($event)"
      > </app-ingredients-form>
    </div>

    <div class="instructions-form mb-6">
      <!-- Instructions form header -->
      <div class="flex justify-between mb-2">
        <h2 class="font-heading font-semibold text-lg tracking-wide">Instructions</h2>

        <div 
          *ngIf="isAuthor || !recipeId"
          matRipple 
          matRippleColor="rgba(162, 211, 255, 0.2)"
          [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
          [matRippleUnbounded]="true"
          [matRippleRadius]="30" 
          class="editing-options flex shrink-0"
        >
          <button 
            *ngIf="!isEditingInstructions"
            (click)="editInstructions()"
            type="button"
            mat-icon-button 
            matTooltip="Click to Edit">
              <mat-icon aria-label="Edit" class="color-dark-gray icon-sm">edit</mat-icon>
          </button>
          <button
            *ngIf="isEditingInstructions" 
            (click)="saveInstructions()"
            type="button"
            mat-icon-button 
            matTooltip="Done Editing">
              <mat-icon class="color-dark-gray icon-sm">visibility</mat-icon>
          </button>
        </div>
      </div>

      <app-instructions-form
        [initialInstructions]="instructions"
        [editable]="isEditingInstructions"
        (instructionsChange)="onInstructionsChange($event)"
      ></app-instructions-form>
    </div>

    <!-- Public / private toggle -->
    <div *ngIf="isAuthor" class="flex flex-col">
      <div class="mb-1">
        <p class="text-xs color-dark-gray">
          {{ isPublic ? 'Anyone can view' : 'Only you can view' }}
        </p>
      </div>
      <mat-slide-toggle
        color="primary"
        id="toggle-public"
        class=""
        formControlName="isPublic"
        (change)="togglePublic($event)"
      ></mat-slide-toggle>
    </div>
  </div>

  <!-- Options fixed footer (only for recipe authors) -->
  <div 
    *ngIf="isAuthor || !recipeId" 
    class="flex justify-between fixed bottom-0 left-0 right-0 px-2 py-2 md:px-6 md:py-4 bg-white"
  >
    <!-- Delete / Archive options -->
    <div 
      *ngIf="recipeId" 
      matRipple 
      matRippleColor="rgba(178, 34, 34, 0.2)"
      [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
      [matRippleUnbounded]="true"
      [matRippleRadius]="30"
      class="flex gap-1"
    >
      <button
        type="button"
        class="font-body font-medium text-xs md:text-sm tracking-widest color-red px-1 py-0.5 bg-white shadow-md rounded-sm flex items-center gap-0.5"
        (click)="!isDemo && confirmDelete()"
        [disabled]="isDemo"
        [class.opacity-40]="isDemo"
        [class.cursor-not-allowed]="isDemo"
      >
        <mat-icon class="text-sm">delete_outline</mat-icon>
        DELETE
      </button>
      <button
        *ngIf="recipeId"
        type="button"
        class="font-body font-medium text-xs md:text-sm tracking-widest px-1 py-0.5 bg-white shadow-md rounded-sm"
        (click)="!isDemo && toggleArchive()"
        [disabled]="isDemo"
        [class.opacity-40]="isDemo"
        [class.cursor-not-allowed]="isDemo"
      >{{ archived ? 'RESTORE' : 'ARCHIVE' }}</button>
    </div>
    
    <!-- Save option -->
    <div 
      matRipple 
      matRippleColor="rgba(255, 165, 0, 0.2)"
      [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
      [matRippleUnbounded]="true"
      [matRippleRadius]="30"
      class="flex"
    >
      <button
        type="button"
        class="font-body font-semibold text-sm md:text-base tracking-widest px-2 py-0.5 bg-white border-2 border-orange shadow-md rounded-sm"
        (click)="!isDemo && saveRecipe()"
        [disabled]="isDemo"
        [class.opacity-40]="isDemo"
        [class.cursor-not-allowed]="isDemo"
      >SAVE</button>
    </div>
  </div>

  <div class="h-8 lg:h-16"></div> <!-- Spacer div -->
</form>

<form [formGroup]="instructionsForm" class="">
  <div formArrayName="instructions" class="mb-2">
    <div
      *ngFor="let instruction of instructions.controls; let i = index"
      [formGroupName]="i"
      class="instruction-row mb-1"
    >
      <!-- Edit mode -->
      <div 
        *ngIf="instruction.value.isEditing && editable" 
        class="flex flex-col md:flex-row space-y-2"
      >
        <div class="flex gap-2 items-center mb-1 w-full">
          <mat-form-field class="instruction-input w-40 rounded-sm">
            <mat-label>Step {{ i + 1 }}</mat-label>
            <textarea matInput placeholder="" formControlName="step">
            </textarea>
          </mat-form-field>
        </div>

        <div class="editing-options-editmode flex gap-1 my-1 md:my-3">
          <button
            class="font-body font-medium text-sm px-1 py-0.5 rounded-sm bg-med-blue"
            type="button" 
            (click)="saveInstruction(i)"
          >&check;</button>
          <button 
            class="font-body font-medium text-sm px-1 py-0.5 rounded-sm"
            type="button" 
            (click)="removeInstruction(i)">remove</button>
        </div>
      </div>

      <!-- View mode -->
      <div 
        *ngIf="!instruction.value.isEditing || !editable" 
        class="flex justify-between border-b border-light"
      >
        <div class="flex">
          <div class="mr-2">
            <p class="font-body font-black text-base">{{ i + 1 }}</p>
          </div>
          <div class="mb-1">
            <p class="font-body text-base">{{ instruction.value.step }}</p>
          </div>
        </div>

        <div class="editing-options-viewmode flex shrink-0 mb-1">
          <button 
            mat-icon-button 
            matTooltip="Click to Edit" 
            (click)="editInstruction(i)" 
            class="iconbutton"
          >
            <mat-icon aria-label="Edit" class="color-dark-gray">edit</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
  <button
    class="font-body font-medium text-sm px-2 py-0.5 rounded-sm border-2 border-black"
    type="button" 
    (click)="addInstruction()"
  >Step +</button>
</form>

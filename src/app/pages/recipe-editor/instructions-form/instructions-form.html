<form [formGroup]="instructionsForm" class="">
  <div formArrayName="instructions" class="mb-2">
    <div
      *ngFor="let instruction of instructions.controls; let i = index"
      [formGroupName]="i"
      class="instruction-row mb-1"
    >
      <!-- Edit mode -->
      <div 
        *ngIf="editable" 
        class="flex justify-between space-y-2"
      >
        <div class="instruction-input flex gap-2 items-center mb-1 w-24 bg-white rounded-sm border border-dark-gray px-1 py-1">
          <div class="flex flex-col space-y-1 w-full">
            <label class="font-medium">{{ i + 1 }}.</label>
            <textarea 
              matInput 
              placeholder="" 
              formControlName="step"
              class="bg-light-blue rounded-sm px-1 py-1">
            </textarea>
          </div>
        </div>

        <div class="editing-options-editmode flex gap-1 my-1 md:my-3">
          <button 
            class="font-body font-medium text-sm px-1 py-0.5 rounded-sm"
            type="button" 
            (click)="removeInstruction(i)">&times;</button>
        </div>
      </div>

      <!-- View mode -->
      <div 
        *ngIf="!editable" 
        class="flex justify-between border-b border-light"
      >
        <div class="flex">
          <div class="mr-2">
            <p class="font-body font-black text-base">{{ i + 1 }}</p>
          </div>
          <div class="mb-1">
            <p class="font-body text-base">{{ instruction.value.step }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button
    *ngIf="editable"
    class="font-body font-medium text-sm px-2 py-0.5 rounded-sm border-2 border-black"
    type="button" 
    (click)="addInstruction()"
  >Step +</button>
</form>

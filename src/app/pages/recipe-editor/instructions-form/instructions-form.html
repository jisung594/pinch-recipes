<form [formGroup]="instructionsForm" class="md:w-3/4">
  <div formArrayName="instructions" class="mb-2">
    
    <!-- Display when recipe already has instructions -->
    <div 
      cdkDropList 
      (cdkDropListDropped)="handleReorder($event)"
      *ngIf="instructions && instructions.length > 0; else emptyInstructions"
      class="flex flex-col gap-1"
    >
      <div
        *ngFor="let instruction of instructions.controls; let i = index"
        [formGroupName]="i"
        class="instruction-row"
      >
        <!-- Edit mode -->
        <div
          cdkDrag 
          *ngIf="editable" 
          class="flex flex-row gap-1"
        >
          <div class="flex justify-between gap-2 w-full rounded-sm bg-light-blue border border-black px-1 py-1">
            <div class="w-full">
              <div class="editing-options-editmode flex flex-row justify-between mb-1">
                <label class="font-body font-medium text-base">{{ i + 1 }}.</label>
                <button 
                  class="font-body font-medium text-xl"
                  type="button" 
                  (click)="removeInstruction(i)">&times;</button>
              </div>

              <!-- Instruction step field-->
              <div class="flex flex-col w-full mb-1">
                <textarea 
                  matInput 
                  placeholder="Step {{ i + 1 }}..."
                  formControlName="step"
                  class="form-field font-normal text-base w-full bg-white placeholder:italic rounded-sm">
                </textarea>
              </div>

              <!-- Instruction notes field -->
              <div class="flex flex-col w-full">
                <div class="flex flex-col px-1 py-0.5 border border-dark rounded-sm">
                  <details 
                    closed
                    matRipple 
                    matRippleColor="rgba(162, 211, 255, 0.5)"
                    [matRippleAnimation]="{enterDuration: 800, exitDuration: 800}"
                    [matRippleUnbounded]="true"
                    [matRippleRadius]="30"
                    class="group"
                  >
                    <summary class="flex justify-between font-heading font-medium text-sm tracking-wide color-dark-gray px-0 list-none">
                      Notes 
                      <span class="color-dark-gray transition-transform group-open:rotate-180">&#9661;</span>
                    </summary>
                    <div class="flex rounded-b-sm">
                      <textarea
                        matInput
                        placeholder="Notes for Step {{ i + 1 }}..."
                        formControlName="notes"
                        class="form-field font-normal px-1 py-1 text-base w-full bg-white placeholder:italic"
                      ></textarea>
                    </div>
                  </details>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Drag handle -->
          <div cdkDragHandle class="drag-handle flex items-center cursor-move active:bg-gray-200">
            <mat-icon>drag_indicator</mat-icon>
          </div>
        </div>

        <!-- View mode -->
        <div 
          *ngIf="!editable" 
          class="flex flex-col border-b border-light"
        >
          <div class="flex gap-1 w-full mb-1">
            <div class="step-label w-2 shrink-0">
              <p class="font-body font-black text-base">{{ i + 1 }}</p>
            </div>

            <div class="flex flex-col">
              <!-- Instruction step field -->
              <div 
                class="step-text flex-1"
                *ngIf="instruction.value.step; else emptyInstruction" 
              >
                <p class="font-body text-base mb-1">{{ instruction.value.step }}</p>
              </div>

              <!-- Instruction notes field -->
              <div 
                class=""
                *ngIf="instruction.value.notes && instruction.value.notes.length > 0"
              >
                <p class="font-body text-sm color-dark-gray whitespace-pre-line">
                  {{ instruction.value.notes }}
                </p>
              </div>
            </div>


            <ng-template #emptyInstruction>
              <div class="">
                <p class="font-body text-base italic color-dark-gray">
                  Instruction draft
                </p>
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </div>

    <!-- Display when recipe has no instructions -->
    <ng-template #emptyInstructions>
      <div class="empty-state text-center py-4">
        <p class="font-body color-dark-gray italic">No instructions yet.</p>
      </div>
    </ng-template>
  </div>

  <button
    *ngIf="editable"
    class="font-body font-medium text-sm px-2 py-0.5 rounded-sm border-2 border-light"
    type="button" 
    (click)="addInstruction()"
  >Step +</button>
</form>

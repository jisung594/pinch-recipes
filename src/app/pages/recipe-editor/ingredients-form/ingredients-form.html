<form [formGroup]="ingredientsForm" class="">
  <div formArrayName="ingredients" class="flex flex-col gap-1 mb-2">

    <!-- Display when recipe already has ingredients -->
    <div *ngIf="ingredients && ingredients.length > 0">
      <div
        *ngFor="let ingredient of ingredients.controls; let i = index"
        [formGroupName]="i"
        class="ingredient-row"
      >
        <!-- Edit mode -->
        <div  
          *ngIf="isEditing"
          class="flex flex-row"
        >
          <div class="flex justify-between gap-1 w-full border border-light px-1 py-1 rounded-sm">
            
            <div class="flex flex-col gap-1">
              <div class="flex gap-2">
                <div class="flex flex-col w-1/2">
                  <label class="font-normal text-sm">Quantity</label>
                  <input 
                    matInput 
                    placeholder="1 1/3" 
                    formControlName="quantity"
                    class="form-field w-full h-4 mt-1 bg-light-blue"
                  >
                </div>
                <div class="flex flex-col w-1/2">
                  <label class="font-normal text-sm">Unit</label>
                  <select 
                    required
                    formControlName="unit"
                    class="form-field w-full h-4 mt-1 color-dark-gray bg-light-blue"
                  >
                    <option value="" disabled selected>Select</option>
                    <option value="cup">cup</option>
                    <option value="tbsp">tbsp</option>
                    <option value="tsp">tsp</option>
                    <option value="g">g</option>
                    <option value="oz">oz</option>
                  </select>
                </div>
              </div>
              <div class="flex flex-col">
                <label class="font-normal text-sm">Item</label>
                <input 
                  matInput 
                  placeholder="whole milk" 
                  formControlName="name"
                  class="form-field w-full h-4 mt-1 bg-light-blue"
                >
              </div>
            </div>

            <div class="editing-options-editmode flex my-1 md:my-3">
              <button
                class="font-body font-medium text-xl"
                type="button" 
                (click)="removeIngredient(i)"
              >&times;</button>
            </div>

          </div>
        </div>

        <!-- View mode -->
        <div 
          *ngIf="!isEditing" 
          class="flex border-b border-light"
        >
          <div class="flex mb-1">
            <div class="mr-2">
              <p class="font-body font-black text-base">&bullet;</p>
            </div>
            <div *ngIf="ingredient.value.quantity || ingredient.value.unit || ingredient.value.name; else emptyIngredient" class="">
              <p class="font-body text-base">
                {{ ingredient.value.quantity }}
                {{ ingredient.value.unit }}
                {{ ingredient.value.name }}
              </p>
            </div>
            <ng-template #emptyIngredient>
              <div class="">
                <p class="font-body text-base color-dark-gray">
                  ( empty ingredient )
                </p>
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </div>

    <!-- Display when recipe has no ingredients -->
    <div *ngIf="!ingredients || ingredients.length === 0" class="empty-state text-center py-4">
      <p class="font-body color-dark-gray">No ingredients yet.</p>
    </div>
  </div>
  
  <button
    *ngIf="isEditing"
    class="font-body font-medium text-sm px-2 py-0.5 rounded-sm border border-light"
    type="button" 
    (click)="addIngredient()"
  >Item +</button>
</form>

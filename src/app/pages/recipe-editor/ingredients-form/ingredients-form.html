<form [formGroup]="ingredientsForm" class="">
  <div formArrayName="ingredients" class="mb-2">
    <div
      *ngFor="let ingredient of ingredients.controls; let i = index"
      [formGroupName]="i"
      class="ingredient-row mb-1"
    >
      <!-- Edit mode -->
      <div *ngIf="ingredient.value.isEditing && editable" class="flex flex-col space-y-2">
        <div class="flex w-full gap-2 items-center mb-1">
          <!-- <div class="flex grow-3 min-w-60 items-start space-x-2"> -->


          <mat-form-field class="ingredient-input">
            <mat-label>Quantity</mat-label>
            <input matInput placeholder="ie. 1 1/3" formControlName="quantity">
          </mat-form-field>

          <mat-form-field class="ingredient-input">
            <mat-label>Unit</mat-label>
            <mat-select formControlName="unit">
              <mat-option value="">Unit</mat-option>
              <mat-option value="cup">cup</mat-option>
              <mat-option value="tbsp">tbsp</mat-option>
              <mat-option value="tsp">tsp</mat-option>
              <mat-option value="g">g</mat-option>
              <mat-option value="oz">oz</mat-option>
            </mat-select>
          </mat-form-field>


          <mat-form-field class="ingredient-input">
            <mat-label>Item</mat-label>
            <input matInput placeholder="ie. dry milk powder" formControlName="name">
          </mat-form-field>

          <!-- <input
            type="text"
            formControlName="quantity"
            placeholder="Quantity"
            class="ingredient-input flex-none w-16 bg-white"
          /> -->
          <!-- <select
            formControlName="unit"
            class="ingredient-input flex-none w-20 appearance-none bg-white"
          >
            <option value="">Unit</option>
            <option value="cup">cup</option>
            <option value="tbsp">tbsp</option>
            <option value="tsp">tsp</option>
            <option value="g">g</option>
            <option value="oz">oz</option>
          </select> -->
          <!-- <input
            type="text"
            formControlName="name"
            placeholder="Ingredient"
            class="ingredient-input flex bg-white"
          /> -->
        </div>

        <div class="editing-options-editmode flex shrink-0 gap-2">
          <button 
            class="font-body font-medium text-sm px-2 py-0.5 rounded-sm bg-med-blue"
            type="button" 
            (click)="saveIngredient(i)"
          >&check;</button>
          <button
            class="font-body font-medium text-sm px-2 py-0.5 rounded-sm"
            type="button" 
            (click)="removeIngredient(i)"
          >remove</button>
        </div>
      </div>

      <!-- View mode -->
      <div 
        *ngIf="!ingredient.value.isEditing || !editable" 
        class="flex justify-between border-b border-light"
      >
        <div class="flex px-0 py-1">
          <p class="font-body text-base">
            {{ ingredient.value.quantity }}
            {{ ingredient.value.unit }}
            {{ ingredient.value.name }}
          </p>
        </div>
        <div class="editing-options-viewmode flex shrink-0">
          <!-- <button
            matButton
            class="font-body font-medium text-sm px-1 py-0.5"
            type="button" 
            (click)="editIngredient(i)"
          >edit</button> -->

          <button 
            mat-icon-button 
            matTooltip="Click to Edit" 
            (click)="editIngredient(i)" 
            class="iconbutton"
          >
            <mat-icon aria-label="Edit" class="color-dark-gray">edit</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
  <button 
    class="font-body font-medium text-sm color-blue px-2 py-0.5 rounded-sm border-2 border-blue"
    type="button" 
    (click)="addIngredient()"
  >Item +</button>
</form>

<form [formGroup]="ingredientsForm" class="">
  <div formArrayName="ingredients" class="flex flex-col gap-1 mb-2">
    <div
      *ngFor="let ingredient of ingredients.controls; let i = index"
      [formGroupName]="i"
      class="ingredient-row"
    >
      <!-- Edit mode -->
      <div  
        *ngIf="editable"
        class="flex flex-row"
      >
        <div class="flex gap-1 md:gap-4 items-center w-full border border-light px-1 py-1 rounded-sm">
          <div class="ingredient-input w-4 bg-white rounded-sm">
            <label class="font-medium">Quantity</label>
            <input 
              matInput 
              placeholder="ie. 1 1/3" 
              formControlName="quantity"
              class="color-dark-gray"
            >
          </div>

          <div class="ingredient-input w-4 bg-white rounded-sm">
            <label class="font-medium">Unit</label>
            <select formControlName="unit">
              <option value="cup">cup</option>
              <option value="tbsp">tbsp</option>
              <option value="tsp">tsp</option>
              <option value="g">g</option>
              <option value="oz">oz</option>
            </select>
          </div>

          <div class="ingredient-input w-4 bg-white rounded-sm">
            <label class="font-medium">Item</label>
            <input 
              matInput 
              placeholder="ie. dry milk powder" 
              formControlName="name"
              class="color-dark-gray"
            >
          </div>
        </div>

        <div class="editing-options-editmode flex my-1 md:my-3">
          <button
            class="font-body font-medium text-sm rounded-sm"
            type="button" 
            (click)="removeIngredient(i)"
          >&times;</button>
        </div>
      </div>

      <!-- View mode -->
      <div 
        *ngIf="!editable" 
        class="flex border-b border-light"
      >
        <div class="flex mb-1">
          <div class="mr-2">
            <p class="font-body font-black text-base">&bullet;</p>
          </div>
          <div class="">
            <p class="font-body text-base">
              {{ ingredient.value.quantity }}
              {{ ingredient.value.unit }}
              {{ ingredient.value.name }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <button
    *ngIf="editable"
    class="font-body font-medium text-sm px-2 py-0.5 rounded-sm border-2 border-black"
    type="button" 
    (click)="addIngredient()"
  >Item +</button>
</form>

<div class="flex flex-col">
  <!-- Main content - always displayed -->
  <div class="homepage px-1 py-4 lg:px-4 lg:py-8">
    <h1 class="font-heading font-bold text-7xl lg:text-9xl mb-6 lg:mb-10 whitespace-pre-line">
      {{ welcomeText }}<span *ngIf="showCursor" class="animate-pulse">|</span>
    </h1>
    <!-- Display for logged-in users -->
    <div *ngIf="user && showButtons" class="animate-fade-in-up">
      <!-- Search bar -->
      <app-search-bar [(searchTerm)]="searchTerm"></app-search-bar>

      <!-- Search results -->
      <div class="mt-6 recipes-container">
        <app-recipes-list [searchTerm]="searchTerm"></app-recipes-list>
      </div>

      <div class="homepage-links flex items-center lg:w-fit font-body font-medium text-base mt-6">
        <button
          class="new-recipe-button flex items-center gap-1 px-2 py-0.5 rounded-sm border-2 border-light"
          type="button"
          routerLink="recipes/new"
          matTooltip="Create new recipe">
            <mat-icon aria-label="Edit" class="icon-sm">edit</mat-icon>
            New Recipe
        </button>
      </div>
    </div>
    <!-- Display for guest users -->
    <div *ngIf="!user" class="animate-fade-in-up">
      <button
        class="login-button flex items-center gap-1 px-2 py-0.5 rounded-sm border-2 border-light"
        type="button"
        routerLink="/login"
        matTooltip="Login">
          <mat-icon aria-label="Login" class="icon-sm">login</mat-icon>
          GET STARTED
      </button>
    </div>
  </div>

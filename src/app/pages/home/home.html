<div class="flex flex-col">
  <!-- Main content - always displayed -->
  <div class="homepage">
    <h1 class="font-heading font-bold text-7xl md:text-8xl lg:text-9xl mb-6 lg:mb-10 whitespace-pre-line">
      {{ welcomeText }}<span class="animate-pulse">+</span>
    </h1>
    <!-- Display for logged-in users -->
    <div *ngIf="user && showButtons" class="animate-fade-in-up">
      <!-- Search bar -->
      <app-search-bar [(searchTerm)]="searchTerm"></app-search-bar>

      <!-- Search results -->
      <div class="mt-6 recipes-container">
        <!-- Section header -->
        <div *ngIf="!searchTerm" class="mb-2">
          <h2 class="font-heading font-semibold text-lg color-dark mb-1">Recent Recipes</h2>
        </div>
        
        <!-- Recipe list with limit for recent view -->
        <app-recipes-list [searchTerm]="searchTerm" [limit]="searchTerm ? null : 3"></app-recipes-list>
        
        <!-- Show all button when not searching -->
        <div *ngIf="!searchTerm" class="mt-4 flex justify-end">
          <a 
            routerLink="/recipes" 
            class="font-body text-sm color-blue hover:opacity-80 underline underline-offset-4">
            View all recipes →
          </a>
        </div>
      </div>
    </div>
    <!-- Display for guest users -->
    <div *ngIf="!user" class="animate-fade-in-up">
      <button
        class="login-button flex items-center gap-1 px-2 py-0.5 rounded-sm border-2 border-light"
        type="button"
        routerLink="/login"
        matTooltip="Login"
      >
        <mat-icon aria-label="Login" class="icon-sm">login</mat-icon>
        GET STARTED
      </button>
    </div>
  </div>

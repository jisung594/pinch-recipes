<div class="profile">
  <div>
    <!-- Profile form header -->
    <div class="flex flex-row justify-between mb-1">
      <div>
        <h1 class="font-heading font-semibold text-xl md:text-2xl tracking-wide">Profile</h1>
      </div>
      <div *ngIf="isEditingProfile" class="editing-options-editmode">
        <button (click)="saveProfile()" type="button" mat-icon-button matTooltip="Done Editing">
          <mat-icon class="color-dark-gray icon-sm">visibility</mat-icon>
        </button>
      </div>
      <div *ngIf="!isEditingProfile" class="editing-options-viewmode">
        <button (click)="editProfile()" type="button" mat-icon-button matTooltip="Click to Edit">
          <mat-icon aria-label="Edit" class="color-dark-gray icon-sm">edit</mat-icon>
        </button>
      </div>
    </div>
    <app-profile-form
      [isEditingProfile]="isEditingProfile"
      (profileChange)="onProfileChange($event)"
    ></app-profile-form>
  </div>

  <div class="h-8"></div>
</div>

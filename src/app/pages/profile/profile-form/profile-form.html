<form [formGroup]="profileForm" class="mb-6">
  <!-- Edit mode -->
  <div *ngIf="isEditingProfile">
    <div class="flex border border-light px-4 py-4 rounded-sm">
      <div class="flex flex-col gap-1">
        <div class="">
          <label class="font-heading font-normal text-base uppercase">Display name</label>
          <input
            matInput
            placeholder="Muffin Man"
            formControlName="displayName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          />
        </div>
        <div class="">
          <label class="font-heading font-normal text-base uppercase">First name</label>
          <input
            matInput
            placeholder="John"
            formControlName="firstName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          />
        </div>
        <div class="">
          <label class="font-heading font-normal text-base uppercase">Last name</label>
          <input
            matInput
            placeholder="Doe"
            formControlName="lastName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- View mode -->
  <div *ngIf="!isEditingProfile">
    <div
      *ngIf="userProfile$ | async as profile"
      class="flex border border-dark px-4 py-4 rounded-sm"
    >
      <div
        *ngIf="!profile.displayName && !profile.firstName && !profile.lastName; else profileData"
      >
        <p class="font-body font-normal text-sm color-dark-gray">No profile yet.</p>
      </div>
      <ng-template #profileData>
        <div *ngIf="profile" class="flex flex-col gap-3">
          <div *ngIf="profile.displayName" class="flex flex-col">
            <label class="font-heading font-normal text-base uppercase mb-1">Display name</label>
            <p class="font-body font-semibold text-2xl">{{ profile.displayName }}</p>
          </div>
          <div *ngIf="profile.firstName || profile.lastName" class="flex flex-col">
            <label class="font-heading font-normal text-base uppercase mb-1">Full name</label>
            <p class="font-body font-semibold text-2xl">
              {{ profile.firstName }} {{ profile.lastName }}
            </p>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</form>

<form [formGroup]="profileForm" class="mb-6">
  <!-- Edit mode -->
  <div *ngIf="isEditingProfile">
    <div class="flex border border-light px-1 py-1 rounded-sm">
      <div class="flex flex-col gap-2">
        <div class="">
          <label class="font-medium text-sm">Display Name</label>
          <input 
            matInput
            placeholder="Muffin Man" 
            formControlName="displayName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          >
        </div>
        <div class="">
          <label class="font-medium text-sm">First Name</label>
          <input 
            matInput 
            placeholder="John" 
            formControlName="firstName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          >
        </div>
        <div class="">
          <label class="font-medium text-sm">Last Name</label>
          <input 
            matInput 
            placeholder="Doe" 
            formControlName="lastName"
            class="form-field w-full h-4 mt-1 bg-light-blue"
          >
        </div>
      </div>
    </div>
  </div>

  <!-- View mode -->
  <div *ngIf="!isEditingProfile">
    <div 
      *ngIf="userProfile$ | async as profile" 
      class="flex border border-light px-1 py-1 rounded-sm"
    >
      <div class="flex flex-col gap-2">
        <div class="flex flex-col">
          <label class="font-light text-sm mb-0.5">Display Name</label>
          <p class="font-body font-semibold text-xl">{{ profile.displayName }}</p>
        </div>
        <div class="flex flex-col">
          <label class="font-light text-sm mb-0.5">Full Name</label>
          <p class="font-body font-semibold text-xl">{{ profile.firstName }} {{ profile.lastName }}</p>
        </div>
      </div>
    </div>
  </div>
</form>

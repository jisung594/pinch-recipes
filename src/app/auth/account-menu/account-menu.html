<div class="account-menu">
  <div 
    *ngIf="!user"
    class="font-subheading font-bold text-xl"
  >
    <a routerLink="/login" (click)="triggerCloseMenu()" class="flex flex-col lg:flex-row">
      <span class="whitespace-pre">login / </span>
      <span>signup</span>
    </a>
  </div>
  <div *ngIf="user" class="logged-in">
    <div class="mb-2 lg:hidden">
      <span class="font-heading font-normal text-lg text-black">
        Hi there, {{ user.displayName || 'baker' }}!
      </span>
    </div>
    <div class="">
      <button
        (click)="handleSignOut()"
        class="font-body font-semibold text-sm text-black tracking-wide px-2 py-1 rounded-sm border-2 border-orange"
      >SIGN OUT</button>
    </div>
  </div>
</div>

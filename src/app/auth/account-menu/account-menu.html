<div class="account-menu">
  <div 
    *ngIf="!user"
    class="font-subheading font-bold text-xl"
  >
    <a routerLink="/login" (click)="triggerCloseMenu()" class="flex flex-col lg:flex-row">
      <span class="whitespace-pre">login / </span>
      <span>signup</span>
    </a>
  </div>
  <div *ngIf="user" class="logged-in">
    <div *ngIf="userProfile$ | async as profile" class="mb-2 lg:hidden">
      <span class="font-body font-normal text-base md:text-2xl text-black">
        Hello, {{ profile.displayName || profile.firstName || 'baker' }}
      </span>
    </div>
    <div class="">
      <button
        (click)="handleSignOut()"
        class="font-body font-semibold text-sm md:text-base text-black tracking-wide px-2 py-0.5 rounded-sm border-2 border-light"
      >SIGN OUT</button>
    </div>
  </div>
</div>

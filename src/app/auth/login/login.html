<div class="login-page flex flex-col gap-2 px-1 py-2">
  <div>
    <h1 class="flex justify-center font-subheading font-extrabold text-2xl mb-2">Welcome back!</h1>
    <form class="flex flex-col gap-1">
      <div>
        <label class="font-medium text-sm">Email</label>
        <input 
          class="form-field w-full h-4 mt-1 bg-light-blue" 
          placeholder="baker214@gmail.com"
        />
      </div>
      <div>
        <label class="font-medium text-sm">Password</label>
        <input 
          class="form-field w-full h-4 mt-1 bg-light-blue"
          placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
        />
      </div>
    </form>
  </div>

  <div class="flex justify-center">
    <h2 class="font-body font-base text-sm">or continue with</h2>
  </div>

  <div class="flex justify-center w-1/2 px-1 py-1 rounded-sm border border-light">
    <!-- <button (click)="handleGoogleSignIn()"> -->
      
      <div class="flex items-center gap-1 h-2" (click)="handleGoogleSignIn()">
        <img
          class="h-2" 
          src="../../../assets/google.png" 
          alt="Google icon"
        >
        <p class="font-normal text-sm">Google</p>
      </div>
    <!-- </button> -->
  </div>

  <div>
    <p class="font-body font-normal text-sm">Don't have an account? <a class="font-bold">Sign up</a></p>
  </div>
</div>

<div class="account-menu">
  <div *ngIf="!user">
    <h1>login / sign up</h1>
    <button (click)="handleGoogleSignIn()">sign in w/ Google</button>
  </div>

  <div *ngIf="user" class="logged-in">
    <!-- User avatar button to open menu -->
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-avatar-btn flex">
      <img
        *ngIf="user.photoURL; else defaultAvatar"
        [src]="user.photoURL"
        alt="User Avatar"
        class="user-avatar-img rounded-full w-2 h-2"
      />
      <ng-template #defaultAvatar>
        <mat-icon class="user-avatar-icon">account_circle</mat-icon>
      </ng-template>
    </button>

    <!-- Dropdown menu for user options -->
    <mat-menu #userMenu="matMenu">
      <div class="flex flex-col p-2">
        <span>Hi, {{ user.displayName }}!</span>
      
        <!-- <button mat-menu-item (click)="handleProfile()">Profile</button> -->
        <button mat-menu-item (click)="handleSignOut()">Sign Out</button>
      </div>
    </mat-menu>   
  </div>
</div>

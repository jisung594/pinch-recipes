<div class="login-page flex flex-col gap-4 px-1 py-2">
  <div>
    <h1 class="flex justify-center font-subheading font-extrabold text-2xl mb-2">Welcome back!</h1>
    <form
      [formGroup]="loginForm"
      (submit)="handleSignIn()"
      class="flex flex-col items-center gap-2"
    >
      <div class="flex flex-col w-full lg:w-1/2">
        <label for="input-email" class="font-medium text-sm">Email</label>
        <input
          id="input-email"
          type="email"
          formControlName="email" 
          class="form-field h-4 mt-1 bg-light-blue text-base" 
          placeholder="baker214@gmail.com"
          required
        />

        <!-- Inline validation error -->
        <div 
          *ngIf="email!.invalid && email!.touched" 
          class="error font-body font-medium text-sm color-red"
        >
          Please enter a valid email address.
        </div>
      </div>
      <div class="flex flex-col w-full lg:w-1/2">
        <label for="input-password" class="font-medium text-sm">Password</label>
        <input
          id="input-password"
          type="password"
          formControlName="password" 
          class="form-field h-4 mt-1 mb-1 bg-light-blue text-base"
          placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
          required
        />
        <div class="flex justify-end">
          <a routerLink="/reset" class="font-subheading font-semibold text-sm">Forgot password?</a>
        </div>

        <!-- Inline validation errors -->
        <div 
          *ngIf="password!.invalid && password!.touched" 
          class="error font-body font-medium text-sm color-red"
        >
          Please enter your password.
        </div>
        <div 
          *ngIf="errorCode === 'auth/invalid-credential'" 
          class="error font-body font-medium text-sm color-red"
        >
          Incorrect email or password -- please try again.
        </div>
      </div>
      <button 
        [disabled]="!loginForm.valid"
        class="font-body font-semibold text-sm w-full lg:w-1/2 px-2 py-1 border border-light"
        type="submit"
      >Login</button>
    </form>
  </div>

  <div class="flex justify-center">
    <h2 class="font-subheading font-base text-sm">or continue with</h2>
  </div>

  <div class="flex justify-center h-4 w-auto">
    <button
      type="button"
      class="flex items-center justify-center gap-2 px-2 py-1 font-body text-sm rounded-sm border border-light"
      (click)="handleGoogleSignIn()"
    >
      <img
        src="../../../assets/google.png"
        alt="Google logo"
        class="h-2 w-2"
      />
      <span>Google</span>
    </button>
  </div>

  <div class="flex justify-center">
    <p class="font-body font-normal text-sm">Don't have an account? 
      <a class="font-bold" routerLink="/signup">Sign up</a>
    </p>
  </div>
</div>

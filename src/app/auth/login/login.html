<div class="login-page flex flex-col gap-4">

  <div class="demo-section flex flex-col items-center rounded-sm px-4 py-6 mb-4">
    <p class="font-heading font-medium text-lg mb-2">Try Pinch features without signing up:</p> 
    <div class="flex flex-col items-center gap-2">
      <button 
        type="button"
        class="demo-button" 
        (click)="loginAsDemo()"
      >
        DEMO
      </button>
      <p class="font-body text-xs">Logged in and pre-loaded with sample recipes.</p>
    </div>
  </div>

  <div>
    <h1 class="flex justify-center font-heading font-bold text-3xl md:text-4xl tracking-wide mb-4">
      WELCOME
    </h1>
    <form
      [formGroup]="loginForm"
      (submit)="handleSignIn()"
      class="flex flex-col items-center gap-2"
    >
      <div class="flex flex-col w-full md:w-2/3">
        <label for="input-email" class="font-body font-medium tracking-normal text-sm lg:text-base"
          >Email</label
        >
        <input
          id="input-email"
          type="email"
          formControlName="email"
          class="form-field h-4 mt-1 bg-light-blue text-base"
          placeholder="jon@pinchthis.com"
          required
        />

        <!-- Inline validation error -->
        <div
          *ngIf="email!.invalid && email!.touched"
          class="error font-body font-medium text-sm color-red"
        >
          Please enter a valid email address.
        </div>
      </div>
      <div class="flex flex-col w-full md:w-2/3">
        <label
          for="input-password"
          class="font-body font-medium tracking-normal text-sm lg:text-base"
          >Password</label
        >
        <input
          id="input-password"
          type="password"
          formControlName="password"
          class="form-field h-4 mt-1 mb-1 bg-light-blue text-base"
          placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
          required
        />
        <div class="flex justify-end">
          <a routerLink="/reset" class="font-body font-normal text-sm">Forgot password?</a>
        </div>

        <!-- Inline validation errors -->
        <div
          *ngIf="password!.invalid && password!.touched"
          class="error font-body font-medium text-sm color-red mt-0.5"
        >
          Please enter your password.
        </div>
        <div
          *ngIf="errorCode === 'auth/invalid-credential'"
          class="error font-body font-medium text-sm color-red mt-0.5"
        >
          Incorrect email or password. Please try again.
        </div>
      </div>
      <button
        [disabled]="!loginForm.valid"
        class="login-button font-body font-semibold text-sm w-full md:w-1/2 lg:w-1/3 px-2 py-1 mt-1 rounded-sm border border-light"
        type="submit"
      >
        LOGIN
      </button>
    </form>
  </div>

  <div class="flex justify-center">
    <h2 class="font-body font-normal text-sm tracking-normal border-t border-b border-light py-1">
      or continue with
    </h2>
  </div>

  <div class="flex justify-center h-4 w-auto">
    <button
      type="button"
      class="google-signin-button flex items-center justify-center gap-2 px-2 py-1 font-body text-sm rounded-sm border border-light"
      (click)="handleGoogleSignIn()"
    >
      <img src="../../../assets/google.png" alt="Google logo" class="h-2 w-2" />
      <span>Google</span>
    </button>
  </div>

  <div class="flex justify-center">
    <p class="font-heading font-normal text-base lg:text-lg tracking-wide">
      Don't have an account?
      <a class="font-bold" routerLink="/signup">Sign up</a>
    </p>
  </div>
</div>

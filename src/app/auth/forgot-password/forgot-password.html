<div class="login-page flex flex-col gap-2 px-1 py-2">
  <div>
    <h1>Forgot your password?</h1>
    <form
      [formGroup]="forgotPwForm"
      (submit)="handleResetPassword()"
      class="flex flex-col gap-2"
    >
      <div>
        <label for="input-email" class="font-medium text-sm">Confirm your email:</label>
        <input
          id="input-email"
          type="email"
          formControlName="email" 
          class="form-field w-full h-4 mt-1 bg-light-blue text-base" 
          placeholder="janedoe@example.com"
          required
        />

        <!-- Inline validation error -->
        <div 
          *ngIf="email!.invalid && email!.touched" 
          class="error font-body font-medium text-sm color-red"
        >
          Please enter a valid email address.
        </div>
      </div>

      <button 
        [disabled]="!forgotPwForm.valid"
        class="font-body font-semibold text-sm px-2 py-1 border border-light"
        type="submit"
      >Reset Password</button>
    </form>
  </div>
</div>

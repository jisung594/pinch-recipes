<div class="flex items-center justify-between px-2 py-2 md:px-6 md:py-4 bg-white">
  <div class="flex">
    <img class="w-8 md:w-10" src="assets/pinch_logo.svg" alt="Pinch logo" routerLink="/" />
  </div>

  <div class="flex items-center gap-2">
    <button
      mat-icon-button
      matTooltip="Click to Open Menu"
      (click)="toggleMenu()"
      class="menu-button lg:hidden flex px-1 py-0.5 rounded-sm border-2 lg:border-0 border-light"
    >
      <mat-icon aria-label="hamburger-menu">menu</mat-icon>
    </button>
    <nav class="hidden lg:flex lg:gap-6">
      <div
        *ngIf="user$ | async"
        class="menu-options font-heading font-bold text-xl flex items-center justify-between gap-4"
      >
        <a routerLink="/">home</a>
        <a routerLink="recipes/new">new recipe</a>
        <a routerLink="/profile">profile</a>
      </div>
      <app-account-menu></app-account-menu>
    </nav>
  </div>
</div>

<!-- Open nav menu on small screens -->
<div
  *ngIf="isMenuOpen"
  class="fixed inset-0 z-50 bg-white"
  animate.enter="menu-enter"
  animate.leave="menu-leave"
>
  <div class="flex flex-col justify-between h-full">
    <div class="flex items-center justify-between px-2 py-2 md:px-6 md:py-4">
      <img
        class="w-8 md:w-10"
        src="assets/pinch_logo.svg"
        alt="Pinch logo"
        routerLink="/"
        (click)="toggleMenu()"
      />
      <div class="flex items-center">
        <button
          mat-icon-button
          matTooltip="Click to Close Menu"
          (click)="toggleMenu()"
          class="close-button lg:hidden flex px-1 py-0.5 rounded-sm border-2 lg:border-0 border-light"
        >
          <mat-icon aria-label="close" class="">close</mat-icon>
        </button>
      </div>
    </div>
    <nav class="flex flex-col justify-between h-full px-4 py-6 md:px-6 md:py-8 text-black">
      <div
        *ngIf="user$ | async"
        class="menu-options flex flex-col gap-2 md:gap-4 font-heading font-bold text-2xl md:text-4xl"
      >
        <a routerLink="/" (click)="toggleMenu()">home</a>
        <a routerLink="recipes/new" (click)="toggleMenu()">new recipe</a>
        <a routerLink="/profile" (click)="toggleMenu()">profile</a>
      </div>
      <app-account-menu (requestClose)="toggleMenu()"></app-account-menu>
    </nav>
  </div>
</div>

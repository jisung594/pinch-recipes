<div class="recipe-index">
  <h1 class="font-heading font-semibold text-xl md:text-2xl tracking-wide mb-4">Recipes</h1>
  
  <!-- Search Section -->
  <div class="search-section border-b-2 border-dotted border-light pb-4 mb-4">
    <p class="font-heading font-normal text-lg lg:text-xl mb-1">Search your recipes:</p>
    
    <input
      [(ngModel)]="recipeSearchTerm"
      (ngModelChange)="onRecipeSearchChange($event)"
      type="text"
      placeholder="Maple Dijon Roasted Chicken"
      class="search-bar w-full px-2 py-1 border border-light rounded-sm font-body font-normal text-lg lg:text-xl"
    />
  </div>
  
  <!-- Filter Section -->
  <div class="filter-section mb-4" (clickOutside)="onClickOutside()">
    <div class="flex flex-col gap-1">
      <label class="font-heading text-base font-medium">Filter by ingredient:</label>
      <div class="relative flex-1">
        <!-- Search input-->
        <input 
          type="text"
          [(ngModel)]="ingredientSearchTerm"
          (ngModelChange)="onIngredientSearchChange($event)"
          (keydown)="onSuggestionKeydown($event)"
          placeholder="e.g., chicken, garlic, basil"
          class="ingredient-filter px-2 py-1 border border-light rounded-sm font-body text-sm w-1/2"
        />
        
        <!-- Clear button -->
        <button 
          *ngIf="ingredientSearchTerm"
          (click)="clearIngredientFilter()"
          class="absolute right-2 top-1/2 transform -translate-y-1/2 color-dark-gray"
          type="button">
          <mat-icon class="text-sm">clear</mat-icon>
        </button>
        
        <!-- Ingredient Suggestions -->
        <div 
          *ngIf="showIngredientSuggestions && ingredientSuggestions.length > 0" 
          class="absolute top-full left-0 right-0 bg-white border border-light rounded-sm mt-1 shadow-md z-10">
          <div 
            *ngFor="let suggestion of ingredientSuggestions; let i = index" 
            class="suggestion-item px-2 py-1 hover:bg-gray-100 cursor-pointer font-body text-sm border-b border-light last:border-b-0"
            [class.bg-light-blue]="i === selectedSuggestionIndex"
            (click)="selectIngredientSuggestion(suggestion)">
            {{ suggestion }}
          </div>
        </div>
      </div>
    </div>
    
    <!-- Current filter indicator -->
    <div *ngIf="selectedIngredient" class="flex items-center gap-2 mt-2">
      <span class="font-body font-normal text-sm color-dark-gray">
        Filtering by: <b>{{ selectedIngredient }}</b>
      </span>
      <button 
        (click)="clearIngredientFilter()"
        class="color-blue hover:color-dark text-sm underline">
        Clear filter
      </button>
    </div>
  </div>
  
  <!-- Main recipes section -->
  <div class="main-recipes">
    <div class="flex flex-col gap-2 rounded-sm mb-6">
      <p *ngIf="!filteredRecipes.length" class="font-body font-normal text-sm color-dark-gray">
        {{ recipeSearchTerm || selectedIngredient ? 'No recipes found.' : 'No recipes yet.' }}
      </p>

      <app-recipes-list [recipes]="filteredRecipes" [searchTerm]="recipeSearchTerm"></app-recipes-list>
    </div>
  </div>

  <!-- Archived recipes section -->
  <div class="archived-recipes flex flex-col rounded-sm px-1 py-1 border border-light">
    <details closed class="group">
      <summary class="flex justify-between list-none font-body font-medium text-sm">
        Archived
        <span class="transition-transform group-open:rotate-180">&#9661;</span>
      </summary>
      <div class="flex flex-col gap-2 mt-3">
        <a
          [routerLink]="['/recipes', r.id]"
          *ngFor="let r of archivedRecipes"
          class="block font-body font-normal text-base color-dark-gray underline-offset-10 hover:underline"
        >
          {{ r.title || 'Untitled' }}
        </a>
      </div>
    </details>
  </div>
</div>

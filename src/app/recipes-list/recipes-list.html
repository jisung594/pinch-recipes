<div class="recipes-list">
  <!-- Search results -->
  <div *ngIf="searchTerm.trim()" class="mb-4">
    <p class="font-body text-sm color-dark-gray">
      {{ 'Searching for "' + searchTerm + '"' }}
    </p>
  </div>

  <!-- Loading state -->
  <div *ngIf="!currentUserId" class="text-center py-8">
    <p class="font-body color-dark-gray italic">Loading recipes...</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="currentUserId && filteredRecipes.length === 0" class="text-center py-8">
    <p class="font-body color-dark-gray italic">
      {{
        searchTerm.trim()
          ? 'No recipes found matching your search.'
          : 'No recipes yet. Create your first recipe!'
      }}
    </p>
  </div>

  <!-- Recipe list -->
  <div class="flex flex-col gap-1">
    <div
      *ngFor="let recipe of filteredRecipes"
      class="recipe-card border border-light rounded-sm px-2 py-1 hover:border-med-blue transition-colors"
    >
      <h3 class="font-body font-normal text-base">
        <a [routerLink]="['/recipes', recipe.id]">
          {{ recipe.title }}
        </a>
      </h3>
    </div>
  </div>
</div>
